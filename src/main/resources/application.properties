# Server
server.port=2005

# Max upload size (chest X-rays can be large)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Model storage path (relative to project root)
app.model.path=saved-model/xray-cnn.zip

# Dataset base path — point this at your downloaded chest_xray folder
app.dataset.path=dataset/chest_xray

# Image dimensions (resize all images to this before feeding to CNN)
app.image.height=64
app.image.width=64
app.image.channels=1

# Training hyperparameters
app.training.epochs=10
app.training.batch-size=32
app.training.learning-rate=0.001
app.training.seed=42
